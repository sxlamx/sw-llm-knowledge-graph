version: "3.9"

services:
  python-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_CLOUD_BASE_URL=https://api.ollama.com/v1
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
      - OLLAMA_CLOUD_MODEL=llama3.2
      - OLLAMA_EMBED_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_EMBED_MODEL=qwen3-embedding
      - OLLAMA_EMBED_DIMENSIONS=1536
      - EMBEDDING_DIMENSION=1536
      - LANCEDB_PATH=/data/lancedb
      - DOCUMENTS_PATH=/data/documents
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_PRIVATE_KEY_PATH=/run/secrets/jwt_private_key
      - JWT_PUBLIC_KEY_PATH=/run/secrets/jwt_public_key
      - FRONTEND_ORIGIN=http://localhost:5333
      - ALLOWED_FOLDER_ROOTS=/data/documents
      - RUST_LOG=info
    volumes:
      - lancedb-data:/data/lancedb
      - doc-storage:/data/documents
      - ../secrets:/run/secrets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5333:80"
    depends_on:
      - python-api
    restart: unless-stopped

volumes:
  lancedb-data:
  doc-storage:

secrets:
  jwt_private_key:
    file: ../secrets/jwt_private_key.pem
  jwt_public_key:
    file: ../secrets/jwt_public_key.pem
