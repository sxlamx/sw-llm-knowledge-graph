name: Python CI

on:
  push:
    branches: [main]
    paths: ['python-api/**']
  pull_request:
    paths: ['python-api/**']

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd python-api && uv sync --all-extras

      - name: Lint with ruff
        run: cd python-api && uv run ruff check app/

      - name: Type check with mypy
        run: cd python-api && uv run mypy app/

      - name: Run tests
        run: cd python-api && uv run pytest tests/ -v
