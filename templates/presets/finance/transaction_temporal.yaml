name: transaction_temporal
type: temporal_graph
language:
  - en
domain: finance
description: "Temporal finance graph — transactions and events with time context"
entity_schema:
  fields:
    - name: name
      type: string
      description: "The canonical name of the financial entity"
      required: true
    - name: entity_type
      type: string
      description: "Type: company, person, asset, currency"
      required: true
    - name: description
      type: string
      description: "Brief description"
      required: false
  key: "{name}"
  display_label: "{name} ({entity_type})"
relation_schema:
  fields:
    - name: source
      type: string
      description: "The source entity"
      required: true
    - name: target
      type: string
      description: "The target entity"
      required: true
    - name: predicate
      type: string
      description: "The relationship type"
      required: true
    - name: time
      type: string
      description: "When the transaction or event occurred (ISO date preferred)"
      required: false
    - name: context
      type: string
      description: "Surrounding text context"
      required: false
  key: "{source}|{predicate}|{target}@{time}"
  source_field: source
  target_field: target
  display_label: "{predicate}"
extraction:
  mode: two_stage
  method: two_stage
  node_prompt_extra: "Extract financial entities: companies, people, assets, and currencies. Use official names and identifiers."
  edge_prompt_extra: "Extract financial relationships with temporal context. Resolve relative time references (e.g., 'last quarter', 'Q3 2024') based on the observation date. Leave time empty if no time information is present. Include transaction amounts and currencies when available."
  merge_strategy_nodes: llm_prefer_first
  merge_strategy_edges: keep_first
identifiers:
  entity_key: "{name}"
  relation_key: "{source}|{predicate}|{target}@{time}"
  relation_source: source
  relation_target: target
  time_field: time