name: supply_chain
type: spatio_temporal_graph
language:
  - en
domain: industry
description: "Supply chain graph — suppliers, products, warehouses, and logistics with time and location"
entity_schema:
  fields:
    - name: name
      type: string
      description: "The canonical name of the supply chain entity"
      required: true
    - name: entity_type
      type: string
      description: "Type: supplier, product, warehouse, port, vehicle"
      required: true
    - name: description
      type: string
      description: "Brief description"
      required: false
  key: "{name}"
  display_label: "{name} ({entity_type})"
relation_schema:
  fields:
    - name: source
      type: string
      description: "The source entity"
      required: true
    - name: target
      type: string
      description: "The target entity"
      required: true
    - name: predicate
      type: string
      description: "Relationship: supplies, stores_at, ships_via, delivers_to"
      required: true
    - name: time
      type: string
      description: "When the supply chain event occurred (ISO date preferred)"
      required: false
    - name: location
      type: string
      description: "Where the event took place"
      required: false
    - name: context
      type: string
      description: "Additional context"
      required: false
  key: "{source}|{predicate}|{target}@{time}|{location}"
  source_field: source
  target_field: target
  display_label: "{predicate}"
extraction:
  mode: two_stage
  method: two_stage
  node_prompt_extra: "Extract supply chain entities: suppliers, products, warehouses, ports, and vehicles. Resolve relative locations (e.g., 'here', 'nearby') based on the observation location. Use official facility names and addresses when available."
  edge_prompt_extra: "Extract supply chain relationships with temporal and spatial context. Resolve relative time and location references based on observation date and location. Leave time or location empty if not stated. Do not infer supply relationships that are not explicitly mentioned."
  merge_strategy_nodes: field_overwrite
  merge_strategy_edges: keep_first
identifiers:
  entity_key: "{name}"
  relation_key: "{source}|{predicate}|{target}@{time}|{location}"
  relation_source: source
  relation_target: target
  time_field: time
  location_field: location