name: biography_graph
type: temporal_graph
language:
  - en
domain: general
description: "Biographical knowledge graph — people, organizations, achievements with temporal context"
entity_schema:
  fields:
    - name: name
      type: string
      description: "The canonical name of the person or organization"
      required: true
    - name: entity_type
      type: string
      description: "Type: person, organization, location, achievement, education"
      required: true
    - name: description
      type: string
      description: "Brief biographical description"
      required: false
  key: "{name}"
  display_label: "{name} ({entity_type})"
relation_schema:
  fields:
    - name: source
      type: string
      description: "The source entity"
      required: true
    - name: target
      type: string
      description: "The target entity"
      required: true
    - name: predicate
      type: string
      description: "Relationship: born_in, educated_at, worked_at, achieved, appointed_to"
      required: true
    - name: time
      type: string
      description: "When the biographical event occurred (year or date)"
      required: false
    - name: context
      type: string
      description: "Biographical context"
      required: false
  key: "{source}|{predicate}|{target}@{time}"
  source_field: source
  target_field: target
  display_label: "{predicate}"
extraction:
  mode: two_stage
  method: two_stage
  node_prompt_extra: "Extract biographical entities: people, organizations, locations, achievements, and education. Use full names and standardized names when available. Do not extract dates as entities — dates belong in the time field of relationships."
  edge_prompt_extra: "Extract biographical relationships with temporal context. Resolve relative time references (e.g., 'last year', 'in 2020') based on the observation date. Leave time empty if no time information is present. Use standard predicates: born_in, educated_at, worked_at, achieved, appointed_to."
  merge_strategy_nodes: field_overwrite
  merge_strategy_edges: keep_first
identifiers:
  entity_key: "{name}"
  relation_key: "{source}|{predicate}|{target}@{time}"
  relation_source: source
  relation_target: target
  time_field: time