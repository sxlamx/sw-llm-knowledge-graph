name: graph
type: graph
language:
  - en
domain: general
description: "General-purpose knowledge graph extraction with entities and relations"
entity_schema:
  fields:
    - name: name
      type: string
      description: "The canonical name of the entity"
      required: true
    - name: entity_type
      type: string
      description: "The type of entity (person, organization, location, concept, event)"
      required: true
    - name: description
      type: string
      description: "A brief description of the entity"
      required: false
  key: "{name}"
  display_label: "{name} ({entity_type})"
relation_schema:
  fields:
    - name: source
      type: string
      description: "The source entity name"
      required: true
    - name: target
      type: string
      description: "The target entity name"
      required: true
    - name: predicate
      type: string
      description: "The relationship type"
      required: true
    - name: context
      type: string
      description: "The surrounding text context for the relationship"
      required: false
  key: "{source}|{predicate}|{target}"
  source_field: source
  target_field: target
  display_label: "{predicate}"
extraction:
  mode: two_stage
  method: two_stage
  merge_strategy_nodes: exact
  merge_strategy_edges: exact
identifiers:
  entity_key: "{name}"
  relation_key: "{source}|{predicate}|{target}"
  relation_source: source
  relation_target: target