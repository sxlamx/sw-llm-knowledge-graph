name: drug_interaction
type: graph
language:
  - en
domain: medical
description: "Drug interaction graph — medications, conditions, enzymes, and interactions"
entity_schema:
  fields:
    - name: name
      type: string
      description: "The canonical name of the drug or medical entity"
      required: true
    - name: entity_type
      type: string
      description: "Type: drug, condition, enzyme, receptor"
      required: true
    - name: description
      type: string
      description: "Brief description of the entity"
      required: false
  key: "{name}"
  display_label: "{name} ({entity_type})"
relation_schema:
  fields:
    - name: source
      type: string
      description: "The source entity (drug or substance)"
      required: true
    - name: target
      type: string
      description: "The target entity"
      required: true
    - name: predicate
      type: string
      description: "Relationship: interacts_with, inhibits, metabolized_by, contraindicated_with"
      required: true
    - name: context
      type: string
      description: "Clinical context or mechanism description"
      required: false
  key: "{source}|{predicate}|{target}"
  source_field: source
  target_field: target
  display_label: "{predicate}"
extraction:
  mode: two_stage
  method: two_stage
  node_prompt_extra: "Extract drug-related entities: medications, active ingredients, enzymes, receptors, and medical conditions. Use generic drug names (INN) rather than brand names when both are available."
  edge_prompt_extra: "Only extract explicitly stated drug interactions. Use standard predicates: interacts_with, inhibits, metabolized_by, contraindicated_with. Describe the interaction mechanism when available. Do not infer interactions that are not stated in the text."
  merge_strategy_nodes: llm_prefer_first
  merge_strategy_edges: keep_first
identifiers:
  entity_key: "{name}"
  relation_key: "{source}|{predicate}|{target}"
  relation_source: source
  relation_target: target