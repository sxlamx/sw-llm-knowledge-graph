name: clinical_graph
type: temporal_graph
language:
  - en
domain: medical
description: "Clinical knowledge graph — patients, conditions, procedures, medications with temporal context"
entity_schema:
  fields:
    - name: name
      type: string
      description: "The canonical name of the clinical entity"
      required: true
    - name: entity_type
      type: string
      description: "Type: patient, condition, procedure, medication, facility, lab_result"
      required: true
    - name: description
      type: string
      description: "Brief clinical description"
      required: false
  key: "{name}"
  display_label: "{name} ({entity_type})"
relation_schema:
  fields:
    - name: source
      type: string
      description: "The source clinical entity"
      required: true
    - name: target
      type: string
      description: "The target clinical entity"
      required: true
    - name: predicate
      type: string
      description: "Relationship: diagnosed_with, treated_with, refers_to, causes, contraindicates"
      required: true
    - name: time
      type: string
      description: "When the clinical event occurred (ISO date preferred)"
      required: false
    - name: context
      type: string
      description: "Clinical context"
      required: false
  key: "{source}|{predicate}|{target}@{time}"
  source_field: source
  target_field: target
  display_label: "{predicate}"
extraction:
  mode: two_stage
  method: two_stage
  node_prompt_extra: "Focus on clinical entities: conditions, procedures, medications, and their relationships. Use standard medical terminology (ICD codes when available). Do not extract dates as entities — dates should go in the time field of relationships."
  edge_prompt_extra: "Only extract explicitly stated clinical relationships. Use standard medical terminology. Resolve relative time references based on the observation date. Leave time field empty when no time information is present. Do not hallucinate clinical relationships."
  merge_strategy_nodes: llm_prefer_first
  merge_strategy_edges: keep_first
identifiers:
  entity_key: "{name}"
  relation_key: "{source}|{predicate}|{target}@{time}"
  relation_source: source
  relation_target: target
  time_field: time