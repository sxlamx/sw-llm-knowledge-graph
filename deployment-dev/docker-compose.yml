version: "3.9"

# ---------------------------------------------------------------------------
# Knowledge Graph Builder — development Docker Compose
#
# Quick start:
#   cp deployment-dev/env/.env.example deployment-dev/env/.env
#   cp deployment-dev/env/.env.frontend.example deployment-dev/env/.env.frontend
#   bash deployment-dev/scripts/start.sh
#
# Services  : python-api (8009) · frontend (5342)
# Hot-reload: yes (uvicorn --reload, npm run dev)
# ---------------------------------------------------------------------------

services:

  python-api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8009:8000"
    environment:
      - OLLAMA_CLOUD_BASE_URL=https://api.ollama.com/v1
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY:-ollama-cloud-dev-key}
      - OLLAMA_CLOUD_MODEL=llama3.2
      - OLLAMA_EMBED_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_EMBED_MODEL=qwen3-embedding
      - OLLAMA_EMBED_DIMENSIONS=1024
      - EMBEDDING_DIMENSION=1024
      - LANCEDB_PATH=/data/lancedb
      - DOCUMENTS_PATH=/data/documents
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-placeholder}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-placeholder}
      - JWT_PRIVATE_KEY_PATH=/app/secrets/jwt_private_key.pem
      - JWT_PUBLIC_KEY_PATH=/app/secrets/jwt_public_key.pem
      - FRONTEND_ORIGIN=http://localhost:5342
      - ALLOWED_FOLDER_ROOTS=/data/documents
      - RUST_LOG=debug
      - COOKIE_SECURE=false
    volumes:
      - lancedb-data:/data/lancedb
      - doc-storage:/data/documents
      - ../..:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/python-api/app
    working_dir: /app/python-api

  frontend:
    image: node:22-alpine
    ports:
      - "5342:5342"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --port 5342 --host
    environment:
      - VITE_API_BASE_URL=http://localhost:8009/api/v1
      - VITE_WS_BASE_URL=ws://localhost:8009/ws

volumes:
  lancedb-data:
  doc-storage:
