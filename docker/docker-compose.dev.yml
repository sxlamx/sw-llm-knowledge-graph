version: "3.9"

services:
  python-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_CLOUD_BASE_URL=https://api.ollama.com/v1
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY:-ollama-cloud-dev-key}
      - OLLAMA_CLOUD_MODEL=llama3.2
      - OLLAMA_EMBED_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_EMBED_MODEL=qwen3-embedding
      - OLLAMA_EMBED_DIMENSIONS=1536
      - EMBEDDING_DIMENSION=1536
      - LANCEDB_PATH=/data/lancedb
      - DOCUMENTS_PATH=/data/documents
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-placeholder}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-placeholder}
      - JWT_PRIVATE_KEY_PATH=../secrets/jwt_private_key.pem
      - JWT_PUBLIC_KEY_PATH=../secrets/jwt_public_key.pem
      - FRONTEND_ORIGIN=http://localhost:5333
      - ALLOWED_FOLDER_ROOTS=/data/documents
      - RUST_LOG=debug
    volumes:
      - lancedb-data:/data/lancedb
      - doc-storage:/data/documents
      - ..:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  frontend:
    image: node:22-alpine
    ports:
      - "5333:5333"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1

volumes:
  lancedb-data:
  doc-storage:
